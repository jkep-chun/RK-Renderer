<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ODE Stability Renderer</title>
    <!-- Simple Custom Stylesheet -->
    <link rel="stylesheet" href="src/style.css">
    <!-- Plotly CDN -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js" charset="utf-8"></script>
</head>
<body>

    <!-- Left Panel: Parameter input fields and Refresh button -->
    <div id="input-panel">
        <h2>Parameters</h2>

        <!-- Input fields for parameters -->
        <label for="x0-input">Initial Position (x0):</label>
        <input type="number" id="x0-input" value="1.0" step="0.1">

        <label for="v0-input">Initial Velocity (v0):</label>
        <input type="number" id="v0-input" value="0.0" step="0.1">

        <label for="m-input">Mass (m):</label>
        <input type="number" id="m-input" value="1.0" step="0.1">

        <label for="k-input">Spring Constant (k):</label>
        <input type="number" id="k-input" value="1.0" step="0.1">

        <label for="b-input">Damping Coefficient (b):</label>
        <input type="number" id="b-input" value="0.1" step="0.1">

        <label for="ts-input">Time Step (ts):</label>
        <input type="number" id="ts-input" value="0.10" step="0.01">

        <label for="t_end-input">End Time (t_end):</label>
        <input type="number" id="t_end-input" value="10" step="1">

        <!-- Refresh button -->
        <button id="refresh-btn">Refresh</button>

        <!-- Error Metrics Section -->
        <div id="error-panel">
            <h2>Error Metrics</h2>
            <table class="error-table">
                <thead>
                    <tr>
                        <th>Method</th>
                        <th>RMS</th>
                        <th>L<sub>&infin;</sub></th>
                    </tr>
                </thead>
                <tbody>
                    <tr id="euler-row">
                        <td><span class="dot euler"></span>Euler</td>
                        <td id="euler-rms">-</td>
                        <td id="euler-linf">-</td>
                    </tr>
                    <tr id="rk2-row">
                        <td><span class="dot rk2"></span>RK2</td>
                        <td id="rk2-rms">-</td>
                        <td id="rk2-linf">-</td>
                    </tr>
                    <tr id="rk4-row">
                        <td><span class="dot rk4"></span>RK4</td>
                        <td id="rk4-rms">-</td>
                        <td id="rk4-linf">-</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Right Container: Header, Plot, and Plot Toggles -->
    <div class="content-container">
        <!-- Header -->
        <header>
            <h1>ODE Stability Renderer</h1>
        </header>

        <!-- Main Dashboard containing the plot -->
        <main>
            <div id="plot-container"></div>
        </main>
        
        <!-- Plot visibility options beneath the plot -->
        <div id="plot-panel">
            <span class="panel-label">Toggle Visibility:</span>
            
            <label for="show-exact">
                <input type="checkbox" id="show-exact" checked>
                Exact Solution
            </label>
            
            <label for="show-euler">
                <input type="checkbox" id="show-euler" checked>
                Forward Euler
            </label>
            
            <label for="show-rk2">
                <input type="checkbox" id="show-rk2" checked>
                RK2
            </label>
            
            <label for="show-rk4">
                <input type="checkbox" id="show-rk4" checked>
                RK4
            </label>
        </div>
    </div>

    <!-- Solver and UI scripts -->
    <script src="src/solver.js"></script>
    <script src="src/app.js"></script>
    <script src="src/solution.js"></script>
</body>
</html>
